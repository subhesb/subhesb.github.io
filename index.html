<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subhes Bhattacharyya</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
      scroll-behavior: smooth;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 2rem;
      background: #1a2a3a;
      color: white;
      flex-wrap: wrap;
      text-align: center;
    }

    header img {
      width: 120px;
      border-radius: 50%;
      border: 3px solid white;
    }

    nav {
      background: #2c3e50;
      text-align: center;
      padding: 0.7rem;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #1abc9c;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    section {
      margin-bottom: 2.5rem;
    }

    h2 {
      border-left: 4px solid #1abc9c;
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #1abc9c;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
    }

    .btn:hover {
      background: #16a085;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #1a2a3a;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <!-- Add your photo -->
  <img src="profile.jpg" alt="Profile Photo">

  <div>
    <h1>Subhes Bhattacharyya</h1>
    <p>Director, Research • Innovation • Sustainable Futures</p>
